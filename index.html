<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг АЗС Казани | Топливо</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Yandex.Metrika counter -->
    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=110744194', 'ym');

    <!-- /Yandex.Metrika counter -->
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-main">
                <div class="brand-title">
                    <span class="pulse-icon">⛽</span>
                    <h1 id="brand-title-text">Мониторинг АЗС</h1>
                    <select id="city-select" class="city-select">
                        <option value="kazan" selected>Казань</option>
                        <option value="spb">Санкт-Петербург</option>
                    </select>
                </div>
                <div class="header-info">
                    <select id="source-select" class="source-select">
                        <option value="combined" selected>Общая база (Все источники)</option>
                        <option value="2gis">2ГИС Топливо</option>
                        <option value="tbank">Т-Банк Топливо</option>
                    </select>
                    <div class="timestamps-box">
                        <span id="scheduler-update-time">Авто-обновление: загрузка...</span>
                        <span id="manual-update-time">Ручное обновление: загрузка...</span>
                    </div>
                    <button id="btn-refresh" class="btn-refresh" title="Обновить данные">
                        <svg class="refresh-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Summary Stats -->
            <div class="summary-cards">
                <div class="stat-card">
                    <div class="stat-icon stat-all">⛽</div>
                    <div class="stat-info">
                        <span class="stat-val" id="stat-total-stations">0</span>
                        <span class="stat-label">Всего АЗС</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon stat-avail">🟢</div>
                    <div class="stat-info">
                        <span class="stat-val" id="stat-avail-stations">0</span>
                        <span class="stat-label">Есть топливо</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon stat-no">🔴</div>
                    <div class="stat-info">
                        <span class="stat-val" id="stat-unavail-stations">0</span>
                        <span class="stat-label">Нет топлива</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon stat-nodata">⚪</div>
                    <div class="stat-info">
                        <span class="stat-val" id="stat-nodata-stations">0</span>
                        <span class="stat-label">Нет отчетов</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon stat-queue">⏱️</div>
                    <div class="stat-info">
                        <span class="stat-val" id="stat-queue-stations">0</span>
                        <span class="stat-label">Очередь > 30м</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Controls / Filters -->
        <section class="controls-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Поиск по названию бренда или адресу...">
                <span class="search-clear-btn" id="search-clear">&times;</span>
            </div>
            
            <div class="filters-grid">
                <!-- Fuel Filter -->
                <div class="filter-group">
                    <label>Тип топлива</label>
                    <div class="filter-options" id="filter-fuel-type">
                        <button class="filter-chip active" data-value="ALL">Все</button>
                        <button class="filter-chip" data-value="AI_92">АИ-92</button>
                        <button class="filter-chip" data-value="AI_95">АИ-95</button>
                        <button class="filter-chip" data-value="AI_98">АИ-98</button>
                        <button class="filter-chip" data-value="AI_100">АИ-100</button>
                        <button class="filter-chip" data-value="DT">Дизель</button>
                        <button class="filter-chip" data-value="GAS">Газ</button>
                    </div>
                </div>

                <!-- Status Filter -->
                <div class="filter-group">
                    <label>Статус наличия</label>
                    <div class="filter-options" id="filter-status">
                        <button class="filter-chip active" data-value="ALL">Все</button>
                        <button class="filter-chip text-green" data-value="AVAILABLE">Есть в наличии</button>
                        <button class="filter-chip text-red" data-value="UNAVAILABLE">Отсутствует</button>
                        <button class="filter-chip text-gray" data-value="NODATA">Нет отчетов</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Stations Grid -->
        <main class="main-content">
            <div class="stations-grid" id="stations-container">
                <!-- Dynamic cards will be generated here -->
                <div class="loading-spinner">Загрузка АЗС...</div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer-bar">
            <p id="footer-text">Мониторинг АЗС © 2026. Разработано на основе открытых данных 2ГИС и Т-Банк Топливо.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
